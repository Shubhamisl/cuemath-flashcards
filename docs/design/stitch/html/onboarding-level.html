<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cuemath Flashcards - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Nunito+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cueYellow: "#FFBA07",
                        inkBlack: "#000000",
                        paperWhite: "#FFFFFF",
                        softCream: "#FFF1CC",
                        mintGreen: "#D0FBE5",
                        bubblePink: "#FFE0FD",
                        trustBlue: "#DBEAFE",
                        alertCoral: "#F97373",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Nunito Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body class="bg-paperWhite text-inkBlack antialiased min-h-screen flex flex-col">
<!-- TopNavBar (Shared Component) -->
<nav class="bg-white dark:bg-zinc-950 border-b border-black/5 dark:border-white/10 sticky top-0 z-50">
<div class="flex justify-between items-center px-12 py-4 w-full max-w-[1440px] mx-auto">
<div class="flex items-center gap-2">
<span class="text-2xl font-black text-black dark:text-white tracking-tighter font-headline">Cuemath Flashcards</span>
</div>
<div class="hidden md:flex items-center gap-8">
<span class="text-yellow-500 dark:text-yellow-400 font-medium">Onboarding</span>
<button class="text-zinc-500 dark:text-zinc-400 hover:text-yellow-600 transition-colors duration-200">Help</button>
<div class="flex items-center gap-2 cursor-pointer active:scale-95 duration-150 ease-in-out">
<span class="material-symbols-outlined text-zinc-500" data-icon="account_circle">account_circle</span>
</div>
</div>
</div>
</nav>
<!-- Progress Bar Section -->
<div class="w-full pt-12 flex flex-col items-center">
<div class="w-full max-w-[520px] px-6">
<div class="h-2 w-full bg-zinc-100 rounded-full overflow-hidden">
<div class="h-full bg-cueYellow w-[66%] rounded-full transition-all duration-500"></div>
</div>
<div class="mt-3 flex justify-between items-center">
<span class="text-[12px] font-bold font-label uppercase tracking-wider text-inkBlack/60">Step 2 of 3</span>
</div>
</div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center px-6 py-12">
<div class="w-full max-w-[520px] text-center mb-10">
<h1 class="font-headline font-extrabold text-[48px] leading-tight tracking-tight text-inkBlack">
                What's your level?
            </h1>
<p class="font-body text-inkBlack/70 text-lg mt-4">
                We'll tailor your daily math practice based on your current comfort zone.
            </p>
</div>
<div class="w-full max-w-[520px] flex flex-col gap-4">
<!-- Level Card 1: Beginner -->
<button class="group w-full text-left bg-paperWhite border border-inkBlack/10 rounded-[24px] p-6 hover:border-cueYellow transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-cueYellow/20">
<div class="flex justify-between items-center mb-1">
<span class="font-headline font-bold text-[22px] text-inkBlack">Beginner</span>
<span class="material-symbols-outlined text-inkBlack/20 group-hover:text-cueYellow transition-colors" data-icon="school">school</span>
</div>
<p class="font-body text-[16px] text-inkBlack/70">I'm just starting out.</p>
</button>
<!-- Level Card 2: Intermediate (Active State) -->
<button class="relative w-full text-left bg-paperWhite border border-inkBlack/10 rounded-[24px] p-6 hover:border-cueYellow transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-cueYellow/20 shadow-sm">
<!-- Left Accent Bar -->
<div class="absolute left-0 top-1/4 bottom-1/4 w-1 bg-cueYellow rounded-r-full"></div>
<div class="flex justify-between items-center mb-1">
<span class="font-headline font-bold text-[22px] text-inkBlack">Intermediate</span>
<span class="material-symbols-outlined text-cueYellow" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<p class="font-body text-[16px] text-inkBlack/70">I know the basics, want to go deeper.</p>
</button>
<!-- Level Card 3: Advanced -->
<button class="group w-full text-left bg-paperWhite border border-inkBlack/10 rounded-[24px] p-6 hover:border-cueYellow transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-cueYellow/20">
<div class="flex justify-between items-center mb-1">
<span class="font-headline font-bold text-[22px] text-inkBlack">Advanced</span>
<span class="material-symbols-outlined text-inkBlack/20 group-hover:text-cueYellow transition-colors" data-icon="military_tech">military_tech</span>
</div>
<p class="font-body text-[16px] text-inkBlack/70">I want serious challenge.</p>
</button>
</div>
<!-- Hint Text -->
<div class="mt-12 text-center max-w-[400px]">
<p class="font-body text-[14px] text-inkBlack/70 italic">
                Don't worry, you can always change your difficulty settings later from your profile dashboard.
            </p>
</div>
</main>
<!-- Aesthetic Decoration (Subtle Visual Interest) -->
<div class="fixed bottom-0 left-0 p-12 pointer-events-none opacity-20">
<div class="w-32 h-32 rounded-full border-4 border-dashed border-softCream"></div>
</div>
<div class="fixed top-24 right-0 p-12 pointer-events-none opacity-10">
<div class="w-48 h-48 bg-cueYellow blur-[100px] rounded-full"></div>
</div>
<!-- Footer Identity -->
<footer class="py-8 w-full max-w-[1440px] mx-auto px-12 flex justify-between items-center border-t border-black/5">
<span class="text-[12px] font-label font-bold uppercase tracking-widest text-inkBlack/40">Step 2 of 3 • Level Selection</span>
<div class="flex gap-6">
<a class="text-[12px] font-label font-bold uppercase tracking-widest text-inkBlack/40 hover:text-cueYellow transition-colors" href="#">Privacy Policy</a>
<a class="text-[12px] font-label font-bold uppercase tracking-widest text-inkBlack/40 hover:text-cueYellow transition-colors" href="#">Terms</a>
</div>
</footer>
</body></html>
