<style>
        body {
            background-color: #f9f9f9;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: center top;
        }
    </style>

<body class="min-h-screen font-body-md text-on-background flex flex-col items-center">
<!-- TopAppBar -->
<header class="bg-[#FFFDF5] text-[#FFBA07] font-['Plus_Jakarta_Sans'] font-extrabold uppercase tracking-tight text-black sticky full-width top-0 border-b-2 border-black flex justify-between items-center w-full px-8 h-20 bg-[url('https://www.transparenttextures.com/patterns/graph-paper.png')] z-50 shadow-none">
<!-- Leading Action -->
<button class="flex items-center gap-xs hover:bg-[#FFBA07] transition-colors duration-200 active:translate-y-0.5 transition-transform px-md py-xs border border-transparent rounded hover:border-black">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
<span class="font-label-bold text-label-bold text-black hidden sm:inline-block">Back to Library</span>
</button>
<!-- Brand/Center Area -->
<div class="flex items-center justify-center flex-1">
<div class="flex items-center gap-sm">
<span class="text-2xl font-black text-black">Cuemath</span>
<div class="h-6 w-px bg-black mx-sm hidden sm:block"></div>
<div class="flex items-center gap-xs text-black hidden sm:flex">
<span class="font-label-bold text-label-bold">Card 7 of 20</span>
<div class="w-2 h-2 rounded-full bg-primary-container border border-black"></div>
</div>
</div>
</div>
<!-- Trailing Actions -->
<div class="flex items-center gap-md">
<div class="flex items-center gap-xs text-black border-2 border-black px-sm py-xs rounded bg-white">
<span class="material-symbols-outlined">timer</span>
<span class="font-label-bold text-label-bold tabular-nums">02:45</span>
</div>
<button class="text-gray-500 hover:bg-[#FFBA07] transition-colors duration-200 active:translate-y-0.5 transition-transform p-xs rounded hover:text-black">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="w-full max-w-4xl px-md py-xl flex flex-col items-center flex-1">
<!-- Progress Indicator Bar -->
<div class="w-full max-w-2xl flex gap-[2px] mb-lg px-md sm:px-0">
<!-- Completed -->
<div class="flex-1 h-3 bg-black border border-black"></div>
<div class="flex-1 h-3 bg-black border border-black"></div>
<div class="flex-1 h-3 bg-black border border-black"></div>
<div class="flex-1 h-3 bg-black border border-black"></div>
<div class="flex-1 h-3 bg-black border border-black"></div>
<div class="flex-1 h-3 bg-black border border-black"></div>
<!-- Current -->
<div class="flex-1 h-3 bg-primary-container border border-black scale-y-125 origin-bottom relative z-10"></div>
<!-- Remaining -->
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
<div class="flex-1 h-3 bg-white border border-black opacity-30"></div>
</div>
<!-- Flashcard Surface -->
<div class="w-full max-w-2xl bg-[#FFFDF5] border border-black rounded-DEFAULT flex flex-col min-h-[400px] mb-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] relative overflow-hidden">
<!-- Card Decorator - Yellow Tab -->
<div class="absolute top-0 right-0 w-16 h-16 bg-primary-fixed opacity-20 transform rotate-45 translate-x-8 -translate-y-8 pointer-events-none"></div>
<!-- Card Header -->
<div class="px-lg py-md border-b border-black flex justify-between items-center bg-white">
<span class="font-label-bold text-label-bold uppercase tracking-widest text-on-background">QUESTION</span>
<button class="text-tertiary-fixed-dim hover:text-black transition-colors">
<span class="material-symbols-outlined">flag</span>
</button>
</div>
<!-- Card Content (Question) -->
<div class="flex-1 flex items-center justify-center p-xl text-center">
<h1 class="font-h1 text-h1 text-on-background max-w-lg">What is the derivative of <span class="font-mono bg-surface-container px-xs rounded border border-surface-dim">sin(x)</span>?</h1>
</div>
<!-- Card Footer -->
<div class="px-lg py-md border-t border-black bg-surface-container-low flex justify-between items-center text-sm font-label-bold text-label-bold">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-[18px]">library_books</span>
<span>Calculus 101</span>
</div>
<div class="flex items-center gap-xs bg-white border border-black px-sm py-xs rounded-sm">
<span class="material-symbols-outlined text-[16px] text-green-600" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span>Mastery: 65%</span>
</div>
</div>
</div>
<!-- Actions Area -->
<div class="flex flex-col items-center gap-md w-full max-w-sm">
<button class="w-full bg-primary-container text-black border border-black font-h3 text-h3 py-md px-lg rounded flex justify-center items-center gap-sm hover:translate-y-[2px] hover:translate-x-[2px] hover:shadow-none shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all active:translate-y-[4px] active:translate-x-[4px] active:shadow-none">
<span>Show answer</span>
</button>
<div class="flex justify-between w-full px-xs mt-sm items-center">
<button class="font-label-bold text-label-bold text-tertiary hover:text-black underline decoration-2 underline-offset-4 decoration-tertiary-fixed-dim hover:decoration-black transition-colors">
                    End Sprint
                </button>
<div class="font-body-md text-sm text-tertiary flex gap-sm opacity-60">
<span class="bg-surface-container border border-surface-dim px-xs py-[2px] rounded text-xs font-mono">Space</span>
<span class="bg-surface-container border border-surface-dim px-xs py-[2px] rounded text-xs font-mono">Esc</span>
</div>
</div>
</div>
</main>
</body></html>
