<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign In | Cuemath Flashcards</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Nunito+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cueYellow: "#FFBA07",
                        inkBlack: "#000000",
                        paperWhite: "#FFFFFF",
                        softCream: "#FFF1CC",
                        mintGreen: "#D0FBE5",
                        bubblePink: "#FFE0FD",
                        trustBlue: "#DBEAFE",
                        alertCoral: "#F97373"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "24px",
                        "3xl": "32px",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Nunito Sans", "sans-serif"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        body {
            background-color: #FFFFFF;
            font-family: 'Nunito Sans', sans-serif;
            color: #000000;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-paperWhite">
<!-- Login Container -->
<main class="w-full max-w-[1440px] px-6 py-12 flex flex-col items-center justify-center min-h-screen">
<!-- Focused Login Column -->
<div class="w-full max-w-[440px] flex flex-col items-center text-center">
<!-- Welcome Pill -->
<div class="bg-cueYellow px-4 py-1.5 rounded-full mb-8">
<span class="font-body font-bold text-inkBlack text-sm">Welcome back</span>
</div>
<!-- Headline -->
<h1 class="font-display font-extrabold text-[28pt] leading-tight tracking-tight text-inkBlack mb-10">
                Sign in to keep your SharpMind journey going.
            </h1>
<!-- Form -->
<div class="w-full space-y-6">
<!-- Email Input -->
<div class="flex flex-col text-left">
<label class="font-label uppercase text-[12px] font-bold text-inkBlack/60 mb-2 px-1 tracking-wider" for="email">Email Address</label>
<input class="w-full h-[56px] px-[20px] py-[16px] bg-paperWhite border-2 border-inkBlack rounded-[12px] font-body text-inkBlack placeholder:text-inkBlack/40 focus:ring-0 focus:border-cueYellow transition-colors outline-none" id="email" placeholder="you@example.com" type="email"/>
</div>
<!-- Primary Action -->
<button class="w-full h-[48px] bg-cueYellow hover:opacity-90 active:scale-[0.98] transition-all rounded-[12px] flex items-center justify-center">
<span class="font-display font-semibold text-[16pt] text-inkBlack">Email me a sign-in link</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-inkBlack/15"></div>
<span class="font-body text-inkBlack/40 text-sm italic">or</span>
<div class="h-[1px] flex-1 bg-inkBlack/15"></div>
</div>
<!-- Google OAuth -->
<button class="w-full h-[48px] bg-transparent border-2 border-inkBlack hover:bg-inkBlack/5 active:scale-[0.98] transition-all rounded-[12px] flex items-center justify-center gap-3">
<svg fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.26 1.07-3.71 1.07-2.87 0-5.3-1.94-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.83c.86-2.59 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-body font-bold text-inkBlack">Continue with Google</span>
</button>
</div>
<!-- Footer Trust Chips -->
<div class="mt-16 flex flex-wrap justify-center gap-3">
<div class="bg-softCream px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-inkBlack/70">verified_user</span>
<span class="font-body text-[12px] font-bold text-inkBlack/70 uppercase tracking-tight">Secure Login</span>
</div>
<div class="bg-mintGreen px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-inkBlack/70">school</span>
<span class="font-body text-[12px] font-bold text-inkBlack/70 uppercase tracking-tight">10k+ Learners</span>
</div>
<div class="bg-trustBlue px-4 py-2 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-[18px] text-inkBlack/70">psychology</span>
<span class="font-body text-[12px] font-bold text-inkBlack/70 uppercase tracking-tight">SharpMind Tech</span>
</div>
</div>
</div>
</main>
<!-- Site Footer (Minimal version based on JSON requirements) -->
<footer class="w-full border-t border-inkBlack/5 bg-paperWhite">
<div class="flex flex-col md:flex-row justify-between items-center py-12 px-8 max-w-[720px] mx-auto gap-6">
<div class="font-headline text-lg font-bold text-inkBlack">Cuemath Flashcards</div>
<div class="flex flex-wrap justify-center gap-6">
<a class="font-body text-inkBlack/40 uppercase text-[12px] hover:text-inkBlack transition-colors" href="#">Privacy Policy</a>
<a class="font-body text-inkBlack/40 uppercase text-[12px] hover:text-inkBlack transition-colors" href="#">Terms of Service</a>
</div>
<div class="font-body text-sm tracking-wide text-inkBlack/40">© 2024 Cuemath Flashcards.</div>
</div>
</footer>
</body></html>
