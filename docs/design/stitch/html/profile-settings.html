<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SharpMind | Profile Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&amp;family=Nunito+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cueYellow: "#FFBA07",
                        inkBlack: "#000000",
                        paperWhite: "#FFFFFF",
                        softCream: "#FFF1CC",
                        mintGreen: "#D0FBE5",
                        bubblePink: "#FFE0FD",
                        trustBlue: "#DBEAFE",
                        alertCoral: "#F97373",
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.5rem", // 24px
                        "3xl": "2rem",   // 32px
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Nunito Sans", "sans-serif"]
                    },
                    boxShadow: {
                        'card-rest': '0 2px 8px rgba(0,0,0,0.06)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #FFFFFF;
            color: #000000;
        }
        .headline-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-paperWhite min-h-screen">
<!-- TopNavBar -->
<header class="bg-white dark:bg-black border-b border-black/5 dark:border-white/10 sticky top-0 z-50">
<nav class="flex justify-between items-center px-8 py-4 w-full max-w-[1440px] mx-auto">
<div class="text-2xl font-extrabold tracking-tight text-black dark:text-white headline-text">
                SharpMind
            </div>
<div class="flex items-center gap-4">
<div class="bg-softCream text-inkBlack font-semibold px-4 py-1.5 rounded-full flex items-center gap-2">
<span class="material-symbols-outlined text-cueYellow" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="font-body text-sm">Day-7</span>
</div>
<div class="w-10 h-10 bg-softCream rounded-full flex items-center justify-center border border-inkBlack/5 cursor-pointer hover:scale-95 transition-transform duration-150">
<span class="headline-text font-extrabold text-inkBlack">S</span>
</div>
</div>
</nav>
</header>
<main class="max-w-[1440px] mx-auto px-8 py-12 flex justify-center">
<!-- Content Container -->
<div class="w-full max-w-[600px]">
<!-- Header Section -->
<div class="mb-12">
<h1 class="headline-text text-[36pt] font-extrabold text-inkBlack leading-tight tracking-tight">
                    Your settings
                </h1>
<p class="font-body text-inkBlack/70 text-lg">
                    Defaults you can change anytime.
                </p>
</div>
<!-- Card Stack -->
<div class="flex flex-col gap-8 pb-20">
<!-- Card 1: Profile -->
<section class="bg-paperWhite rounded-2xl shadow-card-rest p-8 border border-black/5">
<div class="mb-8">
<h2 class="headline-text text-[22pt] font-semibold text-inkBlack">Profile</h2>
<p class="font-body text-inkBlack/60">Tune your SharpMind defaults.</p>
</div>
<div class="flex flex-col gap-8">
<!-- Field 1: Display Name -->
<div class="flex flex-col gap-2">
<label class="font-label text-[14pt] font-semibold uppercase tracking-wide text-inkBlack/60">Display name</label>
<input class="w-full rounded-[12px] border-2 border-inkBlack px-4 py-3.5 text-[16pt] font-medium focus:ring-cueYellow focus:border-cueYellow transition-all" type="text" value="Shubham"/>
</div>
<!-- Field 2: Email -->
<div class="flex flex-col gap-2">
<label class="font-label text-[14pt] font-semibold uppercase tracking-wide text-inkBlack/60">Email</label>
<div class="bg-paperWhite border border-inkBlack/15 rounded-full px-4 py-2.5 w-fit">
<span class="text-inkBlack/60 font-medium">shubhamsm04@gmail.com</span>
</div>
</div>
<!-- Field 3: Subject -->
<div class="flex flex-col gap-3">
<label class="font-label text-[14pt] font-semibold uppercase tracking-wide text-inkBlack/60">Subject</label>
<div class="flex flex-wrap gap-2">
<button class="bg-softCream border-2 border-inkBlack rounded-full px-4 py-2 text-[14pt] font-semibold text-inkBlack transition-colors">Math</button>
<button class="bg-[#FCE7F3] rounded-full px-4 py-2 text-[14pt] font-semibold text-inkBlack hover:bg-[#FBCFE8] transition-colors">Language</button>
<button class="bg-mintGreen rounded-full px-4 py-2 text-[14pt] font-semibold text-inkBlack hover:bg-[#A7F3D0] transition-colors">Science</button>
<button class="bg-trustBlue rounded-full px-4 py-2 text-[14pt] font-semibold text-inkBlack hover:bg-[#BFDBFE] transition-colors">Humanities</button>
<button class="bg-paperWhite border border-inkBlack/15 rounded-full px-4 py-2 text-[14pt] font-semibold text-inkBlack hover:bg-black/5 transition-colors">Other</button>
</div>
</div>
<!-- Field 4: Level -->
<div class="flex flex-col gap-3">
<label class="font-label text-[14pt] font-semibold uppercase tracking-wide text-inkBlack/60">Level</label>
<div class="flex gap-3">
<button class="flex-1 bg-paperWhite border border-inkBlack/15 rounded-full py-3 text-[16pt] font-semibold text-inkBlack hover:bg-black/5 transition-colors">Beginner</button>
<button class="flex-1 bg-softCream border-2 border-inkBlack rounded-full py-3 text-[16pt] font-semibold text-inkBlack transition-all">Intermediate</button>
<button class="flex-1 bg-paperWhite border border-inkBlack/15 rounded-full py-3 text-[16pt] font-semibold text-inkBlack hover:bg-black/5 transition-colors">Advanced</button>
</div>
</div>
<!-- Field 5: Daily Goal -->
<div class="flex flex-col gap-3">
<label class="font-label text-[14pt] font-semibold uppercase tracking-wide text-inkBlack/60">Daily goal</label>
<div class="flex gap-3">
<button class="flex-1 bg-[#FFBA07]/50 rounded-full py-3 text-[16pt] font-semibold text-inkBlack hover:bg-cueYellow/70 transition-colors">10 cards / day</button>
<button class="flex-1 bg-cueYellow border-2 border-inkBlack rounded-full py-3 text-[16pt] font-semibold text-inkBlack transition-all">20 cards / day</button>
<button class="flex-1 bg-[#FFBA07]/50 rounded-full py-3 text-[16pt] font-semibold text-inkBlack hover:bg-cueYellow/70 transition-colors">40 cards / day</button>
</div>
</div>
<!-- CTA -->
<div class="flex justify-end mt-4">
<button class="bg-cueYellow text-inkBlack px-6 py-3.5 rounded-[12px] headline-text font-bold text-lg hover:scale-[0.98] transition-transform duration-150">
                                Save changes
                            </button>
</div>
</div>
</section>
<!-- Card 2: Account -->
<section class="bg-paperWhite rounded-2xl shadow-card-rest p-8 border border-black/5">
<div class="mb-8">
<h2 class="headline-text text-[22pt] font-semibold text-inkBlack">Account</h2>
<p class="font-body text-inkBlack/60">Sign out or wipe everything.</p>
</div>
<div class="flex flex-col gap-5">
<!-- Row 1: Sign Out -->
<div class="flex items-center justify-between">
<span class="font-body text-[16pt] text-inkBlack">Sign out of this device.</span>
<button class="bg-paperWhite border-2 border-inkBlack px-6 py-3 rounded-[12px] text-[16pt] font-semibold text-inkBlack hover:bg-black/5 transition-colors">
                                Sign out
                            </button>
</div>
<div class="h-[1px] bg-inkBlack/10 w-full"></div>
<!-- Row 2: Delete Account -->
<div class="bg-[#FEE2E2]/30 border-l-4 border-alertCoral rounded-2xl p-5 flex items-center justify-between">
<div class="flex flex-col gap-1">
<h3 class="headline-text font-semibold text-[16pt] text-inkBlack">Delete account permanently</h3>
<p class="font-body text-sm text-inkBlack/70">This wipes every deck, card, and review. No undo.</p>
</div>
<button class="bg-paperWhite border-2 border-alertCoral text-alertCoral px-4 py-2.5 rounded-[12px] text-sm font-semibold hover:bg-alertCoral hover:text-white transition-all">
                                Delete
                            </button>
</div>
</div>
</section>
</div>
</div>
</main>
<!-- SideNavBar (Hidden on desktop as per request but defined in Shared Components JSON logic) -->
<!-- Note: Following the Task instruction to prioritize the 1440px width desktop layout and the provided TopNavBar in the Shared Components JSON -->
</body></html>
