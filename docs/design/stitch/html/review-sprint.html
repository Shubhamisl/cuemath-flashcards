<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cuemath Flashcards - Review Sprint</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Nunito+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              cueYellow: "#FFBA07",
              inkBlack: "#000000",
              paperWhite: "#FFFFFF",
              softCream: "#FFF1CC",
              mintGreen: "#D0FBE5",
              bubblePink: "#FFE0FD",
              trustBlue: "#DBEAFE",
              alertCoral: "#F97373",
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "1rem",
              "xl": "1.5rem",
              "panel": "32px",
              "card": "24px",
              "full": "9999px"
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans", "sans-serif"],
              display: ["Plus Jakarta Sans", "sans-serif"],
              body: ["Nunito Sans", "sans-serif"],
              label: ["Nunito Sans", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body {
        background-color: #FFFFFF;
      }
    </style>
</head>
<body class="font-body text-inkBlack min-h-screen flex flex-col items-center">
<!-- Top Navigation Anchor (As defined in JSON, identifying as Cuemath) -->
<!-- Suppression logic: Review-sprint is a focused journey. No chrome as per user request. -->
<!-- Main Review Canvas -->
<main class="w-full max-w-[640px] flex flex-col items-center pt-[80px]">
<!-- Progress Indicator -->
<div class="flex items-center justify-center gap-[12px] mb-[80px]">
<!-- Dots 1-7: solid cueYellow -->
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<div class="w-[10px] h-[10px] rounded-full bg-cueYellow"></div>
<!-- Dot 8: 14px, cueYellow at 60% opacity -->
<div class="w-[14px] h-[14px] rounded-full bg-cueYellow/60"></div>
<!-- Dots 9-20: inkBlack at 15% opacity -->
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
<div class="w-[10px] h-[10px] rounded-full bg-inkBlack/15"></div>
</div>
<!-- Flashcard Panel -->
<section class="w-[640px] h-[360px] bg-softCream rounded-card border border-inkBlack/5 flex items-center justify-center p-12 transition-all hover:border-inkBlack/10">
<h1 class="font-display font-semibold text-[32px] text-inkBlack text-center leading-tight tracking-tight">
                What is the derivative of sin(x)?
            </h1>
</section>
<!-- Primary Action -->
<button class="mt-6 w-[640px] h-[56px] bg-cueYellow hover:brightness-95 active:scale-[0.98] transition-all duration-150 rounded-[12px] flex items-center justify-center border-b-4 border-inkBlack/10">
<span class="font-body font-bold text-inkBlack text-lg">Show answer (Space)</span>
</button>
<!-- Hint Text -->
<p class="mt-8 font-body text-[13px] text-inkBlack/50 text-center">
            Esc to end early
        </p>
<!-- Decoration/Contextual element (Implicit from brand: Friendly/Confident) -->
<div class="mt-20 flex items-center gap-2 opacity-20">
<span class="material-symbols-outlined text-inkBlack" data-icon="auto_awesome">auto_awesome</span>
<span class="font-label text-xs uppercase tracking-widest font-bold">Cuemath Sprint Mode</span>
</div>
</main>
<!-- Footer Anchor (As defined in JSON) -->
<!-- Suppression logic: Task-focused sub-page should prioritize canvas. Footer excluded for focus. -->
</body></html>
