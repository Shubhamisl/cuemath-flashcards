<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cuemath Flashcards - Onboarding</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800;900&amp;family=Nunito+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        cueYellow: "#FFBA07",
                        inkBlack: "#000000",
                        paperWhite: "#FFFFFF",
                        softCream: "#FFF1CC",
                        mintGreen: "#D0FBE5",
                        bubblePink: "#FFE0FD",
                        trustBlue: "#DBEAFE",
                        alertCoral: "#F97373"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.5rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans", "sans-serif"],
                        display: ["Plus Jakarta Sans", "sans-serif"],
                        body: ["Nunito Sans", "sans-serif"],
                        label: ["Nunito Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            background-color: #FFFFFF;
            color: #000000;
        }
        .headline-text {
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body class="bg-paperWhite min-h-screen flex flex-col">
<!-- TopNavBar - Rendered based on Shared Components JSON with Contextual suppression for onboarding -->
<header class="bg-white dark:bg-zinc-950 border-b border-zinc-100 dark:border-zinc-800 docked full-width top-0 h-20 flex justify-between items-center px-10 w-full max-w-[1440px] mx-auto">
<div class="text-2xl font-black text-zinc-900 dark:text-white plus-jakarta-sans tracking-tight">
            Cuemath Flashcards
        </div>
<div class="flex items-center gap-6">
<button class="text-zinc-400 dark:text-zinc-500 font-medium hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors p-2 rounded-full active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="help">help</span>
</button>
<button class="text-zinc-400 dark:text-zinc-500 font-medium hover:bg-zinc-50 dark:hover:bg-zinc-900 transition-colors p-2 rounded-full active:scale-95 duration-200 ease-in-out">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
</header>
<!-- Progress Bar -->
<div class="w-full h-2 bg-inkBlack/10">
<div class="h-full bg-cueYellow transition-all duration-500" style="width: 33.33%;"></div>
</div>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-start pt-16 pb-24 px-6">
<div class="w-full max-w-[520px]">
<!-- Header Section -->
<div class="text-center mb-12">
<h1 class="headline-text text-[48px] font-extrabold leading-tight text-inkBlack mb-4">
                    What are you studying?
                </h1>
<p class="text-[18px] font-medium text-inkBlack/70 font-body">
                    We'll tune colors and defaults to fit.
                </p>
</div>
<!-- Card Stack -->
<div class="flex flex-col gap-4">
<!-- Math Card -->
<button class="group w-full text-left bg-softCream px-8 py-6 rounded-[24px] border-2 border-transparent hover:border-inkBlack transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<span class="headline-text text-[22px] font-semibold text-inkBlack">Math</span>
<div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-inkBlack" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Science Card -->
<button class="group w-full text-left bg-mintGreen px-8 py-6 rounded-[24px] border-2 border-transparent hover:border-inkBlack transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<span class="headline-text text-[22px] font-semibold text-inkBlack">Science</span>
<div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-inkBlack" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Language Card -->
<button class="group w-full text-left bg-bubblePink px-8 py-6 rounded-[24px] border-2 border-transparent hover:border-inkBlack transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<span class="headline-text text-[22px] font-semibold text-inkBlack">Language</span>
<div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-inkBlack" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Humanities Card -->
<button class="group w-full text-left bg-trustBlue px-8 py-6 rounded-[24px] border-2 border-transparent hover:border-inkBlack transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<span class="headline-text text-[22px] font-semibold text-inkBlack">Humanities</span>
<div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-inkBlack" data-icon="chevron_right">chevron_right</span>
</div>
</button>
<!-- Other Card -->
<button class="group w-full text-left bg-softCream px-8 py-6 rounded-[24px] border-2 border-transparent hover:border-inkBlack transition-all duration-200 active:scale-[0.98] flex items-center justify-between">
<span class="headline-text text-[22px] font-semibold text-inkBlack">Other</span>
<div class="w-10 h-10 rounded-full bg-white/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
<span class="material-symbols-outlined text-inkBlack" data-icon="chevron_right">chevron_right</span>
</div>
</button>
</div>
<!-- Footer info -->
<div class="mt-16 text-center">
<span class="font-label text-[12px] uppercase tracking-widest text-inkBlack/60">
                    Step 1 of 3
                </span>
</div>
</div>
</main>
<!-- Contextual Decorative Elements (Bento-style background hints) -->
<div class="fixed top-1/2 -left-32 w-64 h-64 bg-cueYellow/10 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-1/2 -right-32 w-64 h-64 bg-mintGreen/20 rounded-full blur-3xl -z-10"></div>
</body></html>
